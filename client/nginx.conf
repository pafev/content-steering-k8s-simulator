events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # O CoreDNS do Kubernetes
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

    # UI do Cliente
    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }

    # Gateway para o Steering Server
    server {
        listen 30500 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/steering-server.pem;
        ssl_certificate_key /etc/nginx/certs/steering-server-key.pem;

        location / {
            proxy_pass https://steering-server.default.svc.cluster.local:30500;
            proxy_ssl_verify off;
            proxy_set_header Host steering-server.default.svc.cluster.local;

            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }

    # Gateway para Delivery Node 1
    server {
        listen 8001 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/delivery-node-1.pem;
        ssl_certificate_key /etc/nginx/certs/delivery-node-1-key.pem;

        location / {
            proxy_pass https://delivery-node-1.default.svc.cluster.local:443;
            proxy_ssl_verify off;
            proxy_set_header Host delivery-node-1.default.svc.cluster.local;

            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }

    # Gateway para Delivery Node 2
    server {
        listen 8002 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/delivery-node-2.pem;
        ssl_certificate_key /etc/nginx/certs/delivery-node-2-key.pem;

        location / {
            proxy_pass https://delivery-node-2.default.svc.cluster.local:443;
            proxy_ssl_verify off;
            proxy_set_header Host delivery-node-2.default.svc.cluster.local;

            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }

    # Gateway para Delivery Node 3
    server {
        listen 8003 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/delivery-node-3.pem;
        ssl_certificate_key /etc/nginx/certs/delivery-node-3-key.pem;

        location / {
            proxy_pass https://delivery-node-3.default.svc.cluster.local:443;
            proxy_ssl_verify off;
            proxy_set_header Host delivery-node-3.default.svc.cluster.local;

            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }
}
