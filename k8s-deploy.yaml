apiVersion: v1
kind: Pod
metadata:
  name: dash-client
  labels:
    app: dash-client
spec:
  containers:
  - name: client
    image: pafev/content-steering:client-latest
    imagePullPolicy: Always
    ports:
    - containerPort: 80
    - containerPort: 8001
    - containerPort: 8002
    - containerPort: 8003
    - containerPort: 30500
    volumeMounts:
    - name: cert-steering
      mountPath: /etc/nginx/certs/steering-server.pem
      subPath: steering-server.pem
      readOnly: true
    - name: cert-steering-key
      mountPath: /etc/nginx/certs/steering-server-key.pem
      subPath: steering-server-key.pem
      readOnly: true
    - name: cert-node1
      mountPath: /etc/nginx/certs/delivery-node-1.pem
      subPath: delivery-node.pem
      readOnly: true
    - name: cert-node1-key
      mountPath: /etc/nginx/certs/delivery-node-1-key.pem
      subPath: delivery-node-key.pem
      readOnly: true
    - name: cert-node2
      mountPath: /etc/nginx/certs/delivery-node-2.pem
      subPath: delivery-node.pem
      readOnly: true
    - name: cert-node2-key
      mountPath: /etc/nginx/certs/delivery-node-2-key.pem
      subPath: delivery-node-key.pem
      readOnly: true
    - name: cert-node3
      mountPath: /etc/nginx/certs/delivery-node-3.pem
      subPath: delivery-node.pem
      readOnly: true
    - name: cert-node3-key
      mountPath: /etc/nginx/certs/delivery-node-3-key.pem
      subPath: delivery-node-key.pem
      readOnly: true
  volumes:
  - name: cert-steering
    secret:
      secretName: steering-server-certs
  - name: cert-steering-key
    secret:
      secretName: steering-server-certs
  - name: cert-node1
    secret:
      secretName: delivery-node-1-certs
  - name: cert-node1-key
    secret:
      secretName: delivery-node-1-certs
  - name: cert-node2
    secret:
      secretName: delivery-node-2-certs
  - name: cert-node2-key
    secret:
      secretName: delivery-node-2-certs
  - name: cert-node3
    secret:
      secretName: delivery-node-3-certs
  - name: cert-node3-key
    secret:
      secretName: delivery-node-3-certs
